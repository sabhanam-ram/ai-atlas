<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page_title %}{{ page_title }} · {{ site_title }}{% else %}{{ site_title }}{% endif %}</title>
  <link rel="stylesheet" href="{{ rel('style.css') }}">
</head>
<body>
  <header class="site-header">
    <div class="wrap">
      <a class="brand" href="{{ rel('index.html') }}">learning<span class="dot">·</span>ai</a>
      <nav>
        {% for item in nav %}<a href="{{ rel(item.page) }}">{{ item.label }}</a>{% endfor %}
      </nav>
    </div>
  </header>
  <main>
{% block content %}{% endblock %}
  </main>
  <footer class="site-footer">
    Generated by the learning-ai pipeline · knowledge in <code>content/</code>, raw transcripts in <code>references/</code>.
  </footer>
</body>
</html>
